name: Build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: |
          New-Item -ItemType Directory -Path pkg -Force
          Copy-Item target/release/githttp.exe pkg/
          Copy-Item config.example.yaml pkg/
          Compress-Archive -Path pkg/* -DestinationPath githttp-x86_64-pc-windows-msvc.zip
      - uses: actions/upload-artifact@v4
        with:
          name: githttp-x86_64-pc-windows-msvc
          path: githttp-x86_64-pc-windows-msvc.zip

  build-linux-musl:
    name: Linux x86_64 (musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --target x86_64-unknown-linux-musl
      - run: |
          cp target/x86_64-unknown-linux-musl/release/githttp .
          tar -czf githttp-x86_64-unknown-linux-musl.tar.gz githttp config.example.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: githttp-x86_64-unknown-linux-musl
          path: githttp-x86_64-unknown-linux-musl.tar.gz

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux-musl]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: githttp-*
          merge-multiple: true
      - run: ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            githttp-x86_64-pc-windows-msvc.zip
            githttp-x86_64-unknown-linux-musl.tar.gz
