# Git HTTP Server Configuration

# Git repository root directory (where bare repos are stored)
git_project_root: "/path/to/git/repos"

# Path to git-http-backend executable (only needed when backend=cgi, ignored when backend=native)
# CGI mode: proxies all Git requests through git-http-backend CGI program, best compatibility, requires extra install
# Native mode: directly invokes git upload-pack / git receive-pack, no CGI overhead, better performance, no git-http-backend needed
git_http_backend: "/usr/local/libexec/git-core/git-http-backend"

# Listen address
listen_addr: "0.0.0.0:18011"

# User authentication (username -> SHA-256 hashed password)
# Add user: githttp adduser <username>
# Change password: githttp setpassword <username>
# Delete user: githttp deluser <username>
users: {}

# Backend mode: cgi | native (default)
#   cgi    - proxy requests via legacy git-http-backend CGI program, URL path: /*path
#   native - directly invoke git upload-pack/receive-pack, URL path: /*path
backend: "native"

# Logging configuration (optional)
#   file_enabled - whether to write logs to file (default: false)
#   log_dir      - log directory (default: "logs")
logging:
  file_enabled: false
  log_dir: "logs"
